name: api

permissions:
  contents: read

on:
  pull_request:
    paths: ["services/api/**", ".github/workflows/api.yml"]
  push:
    branches: [main]
    paths: ["services/api/**", ".github/workflows/api.yml"]

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest -q

  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard Fly token
        id: guard
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "FLY_API_TOKEN not set; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # pinned (was @master)
        if: steps.guard.outputs.skip != 'true'
      - name: Deploy citycrawl-api
        if: steps.guard.outputs.skip != 'true'
        working-directory: services/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only
